        const searchCodigoInput = document.getElementById('searchCodigo');
        const searchSKUInput = document.getElementById('searchSKU');
        const searchNombreInput = document.getElementById('searchNombre');
        const tableBody = document.getElementById('tableBody');
        const emptyState = document.getElementById('emptyState');
        const rowCount = document.getElementById('rowCount');
        const foundRecords = document.getElementById('foundRecords');

        function renderTable(results) {
            tableBody.innerHTML = '';
            
            if (results.length === 0) {
                emptyState.style.display = 'block';
                rowCount.textContent = '0';
                foundRecords.textContent = '0';
                return;
            }

            emptyState.style.display = 'none';
            rowCount.textContent = results.length.toLocaleString('es-CL');
            foundRecords.textContent = results.length.toLocaleString('es-CL');

            results.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="codigo">${escapeHtml(item.codigo)}</td>
                    <td class="sku">${escapeHtml(item.sku)}</td>
                    <td class="nombre">${escapeHtml(item.nombre)}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function filterResults() {
            const codigoQuery = searchCodigoInput.value.trim().toLowerCase();
            const skuQuery = searchSKUInput.value.trim().toLowerCase();
            const nombreQuery = searchNombreInput.value.trim().toLowerCase();

            let results = data;

            if (codigoQuery) {
                results = results.filter(item => 
                    item.codigo.toLowerCase().includes(codigoQuery)
                );
            }

            if (skuQuery) {
                results = results.filter(item => 
                    item.sku.toLowerCase().includes(skuQuery)
                );
            }

            if (nombreQuery) {
                results = results.filter(item => 
                    item.nombre.toLowerCase().includes(nombreQuery)
                );
            }

            renderTable(results);
        }

        searchCodigoInput.addEventListener('input', filterResults);
        searchSKUInput.addEventListener('input', filterResults);
        searchNombreInput.addEventListener('input', filterResults);

        // Renderizar tabla inicial
        renderTable(data);
    </script>
